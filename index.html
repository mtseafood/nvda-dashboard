<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="股票看板">
<title>股票儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #6b6b7a;
    --green: #00e5a0;
    --red: #ff4d6d;
    --blue: #4d9fff;
    --amber: #ffb347;
    --accent: #b8ff57;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 40px 24px;
    max-width: 600px;
    margin: 0 auto;
  }
  .page-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }
  .page-heading {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 32px;
    letter-spacing: -0.01em;
  }
  .stock-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 10px;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .stock-card:hover { border-color: var(--border2); background: #15151e; }
  .card-row { display: flex; align-items: center; justify-content: space-between; }
  .ticker { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -0.02em; }
  .company { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .price-col { text-align: right; }
  .price { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .change { font-size: 12px; font-family: 'DM Mono', monospace; margin-top: 3px; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .neutral { color: var(--muted); }
  .loading { color: var(--muted); font-size: 12px; }
  .sector-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    padding: 2px 8px;
    border-radius: 3px;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }
  .update-note {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 28px;
  }
</style>
</head>
<body>

<div class="page-title">自選股</div>
<div class="page-heading">我的儀表板</div>

<a class="stock-card" href="nvda.html">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:#b8ff57;"></div>
  <div class="sector-badge" style="background:rgba(184,255,87,0.1);color:#b8ff57;border:1px solid rgba(184,255,87,0.25);">半導體・人工智慧</div>
  <div class="card-row">
    <div>
      <div class="ticker">NVDA</div>
      <div class="company">輝達公司・那斯達克</div>
    </div>
    <div class="price-col">
      <div class="price" id="price-NVDA">—</div>
      <div class="change" id="change-NVDA"><span class="loading">載入中...</span></div>
    </div>
  </div>
</a>

<a class="stock-card" href="tsla.html">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:#4d9fff;"></div>
  <div class="sector-badge" style="background:rgba(77,159,255,0.1);color:#4d9fff;border:1px solid rgba(77,159,255,0.25);">電動車・清潔能源</div>
  <div class="card-row">
    <div>
      <div class="ticker">TSLA</div>
      <div class="company">特斯拉公司・那斯達克</div>
    </div>
    <div class="price-col">
      <div class="price" id="price-TSLA">—</div>
      <div class="change" id="change-TSLA"><span class="loading">載入中...</span></div>
    </div>
  </div>
</a>

<a class="stock-card" href="amd.html">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:#ff4d6d;"></div>
  <div class="sector-badge" style="background:rgba(255,77,109,0.1);color:#ff4d6d;border:1px solid rgba(255,77,109,0.25);">半導體・處理器/顯示卡</div>
  <div class="card-row">
    <div>
      <div class="ticker">AMD</div>
      <div class="company">超微半導體・那斯達克</div>
    </div>
    <div class="price-col">
      <div class="price" id="price-AMD">—</div>
      <div class="change" id="change-AMD"><span class="loading">載入中...</span></div>
    </div>
  </div>
</a>

<a class="stock-card" href="mu.html">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:#ffb347;"></div>
  <div class="sector-badge" style="background:rgba(255,179,71,0.1);color:#ffb347;border:1px solid rgba(255,179,71,0.25);">半導體・記憶體</div>
  <div class="card-row">
    <div>
      <div class="ticker">MU</div>
      <div class="company">美光科技・那斯達克</div>
    </div>
    <div class="price-col">
      <div class="price" id="price-MU">—</div>
      <div class="change" id="change-MU"><span class="loading">載入中...</span></div>
    </div>
  </div>
</a>

<a class="stock-card" href="avgo.html">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:#a78bfa;"></div>
  <div class="sector-badge" style="background:rgba(167,139,250,0.1);color:#a78bfa;border:1px solid rgba(167,139,250,0.25);">半導體・網路晶片</div>
  <div class="card-row">
    <div>
      <div class="ticker">AVGO</div>
      <div class="company">博通公司・那斯達克</div>
    </div>
    <div class="price-col">
      <div class="price" id="price-AVGO">—</div>
      <div class="change" id="change-AVGO"><span class="loading">載入中...</span></div>
    </div>
  </div>
</a>

<a class="stock-card" href="mrvl.html">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:#34d399;"></div>
  <div class="sector-badge" style="background:rgba(52,211,153,0.1);color:#34d399;border:1px solid rgba(52,211,153,0.25);">半導體・資料基礎設施</div>
  <div class="card-row">
    <div>
      <div class="ticker">MRVL</div>
      <div class="company">邁威爾科技・那斯達克</div>
    </div>
    <div class="price-col">
      <div class="price" id="price-MRVL">—</div>
      <div class="change" id="change-MRVL"><span class="loading">載入中...</span></div>
    </div>
  </div>
</a>

<div class="update-note" id="update-note">正在獲取即時報價...</div>

<script>
  const tickers = ['NVDA', 'TSLA', 'AMD', 'MU', 'AVGO', 'MRVL'];

  function fmt(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  async function fetchPrice(symbol) {
    const urls = [
      `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`,
      `https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`
    ];
    for (const url of urls) {
      try {
        const res = await fetch(url);
        if (!res.ok) continue;
        const data = await res.json();
        const meta = data?.chart?.result?.[0]?.meta;
        if (!meta || !meta.regularMarketPrice) continue;
        return {
          price: meta.regularMarketPrice,
          prevClose: meta.previousClose || meta.chartPreviousClose
        };
      } catch(e) { continue; }
    }
    return null;
  }

  async function loadAll() {
    const results = await Promise.all(tickers.map(t => fetchPrice(t)));
    results.forEach((d, i) => {
      const sym = tickers[i];
      const priceEl = document.getElementById('price-' + sym);
      const changeEl = document.getElementById('change-' + sym);
      if (!d) {
        priceEl.textContent = '—';
        changeEl.innerHTML = '<span class="neutral">無法取得</span>';
        return;
      }
      const change = d.price - d.prevClose;
      const pct = (change / d.prevClose) * 100;
      const cls = change >= 0 ? 'up' : 'down';
      const sign = change >= 0 ? '+' : '';
      priceEl.textContent = fmt(d.price);
      priceEl.className = 'price ' + cls;
      changeEl.innerHTML = `<span class="${cls}">${sign}${pct.toFixed(2)}%</span>`;
    });
    const now = new Date();
    document.getElementById('update-note').textContent =
      '更新於 ' + now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) +
      '・' + now.toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric'});
  }

  loadAll();
  setInterval(loadAll, 60000);
</script>
</body>
</html>
